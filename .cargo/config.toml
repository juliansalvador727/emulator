# Cross-compilation to native Windows from WSL.
#
# The default build target is the mingw-w64 Windows target, so a bare
# `cargo run` builds a Windows .exe and launches it through WSL's
# Windows-interop -- it runs as a real Windows process where SDL3 talks to
# WASAPI and the compositor directly, bypassing the WSLg audio bridge that
# wedges (see TODO.md's host audio failure model section). That is the same
# platform `cargo win` targets; `win` only adds `--release` on top.
#
# Native-Linux builds/tests still work via the `lin*` aliases below (or an
# explicit `--target x86_64-unknown-linux-gnu`), which is the fast path for
# the unit-test loop since it skips the mingw link + interop launch.
#
# Requires: sudo apt-get install gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
#           rustup target add x86_64-pc-windows-gnu

[build]
# Applies to every cargo command (run/build/test/check) unless overridden
# with an explicit --target.
target = "x86_64-pc-windows-gnu"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

[alias]
# Windows (the default target): `win` mirrors `cargo run` but optimized.
win = "run --release --target x86_64-pc-windows-gnu"
win-build = "build --release --target x86_64-pc-windows-gnu"
# Native Linux escape hatches, for fast local iteration and tests.
lin = "run --target x86_64-unknown-linux-gnu"
lin-build = "build --target x86_64-unknown-linux-gnu"
lin-test = "test --target x86_64-unknown-linux-gnu"
